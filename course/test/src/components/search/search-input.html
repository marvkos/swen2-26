<div class="space-x-2">
  <input
    type="text"
    [value]="vm.query()"
    (input)="vm.setQuery($event.target.value)"
    class="border border-gray-300 p-2 rounded-xs"
  />
  <input
    type="submit"
    value="Search"
    [disabled]="!vm.isSearchEnabled()"
    class="bg-amber-200 p-2 rounded-xs cursor-pointer disabled:bg-amber-50 disabled:text-amber-200 disabled:cursor-not-allowed"
  />
</div>
