<div class="flex flex-col space-y-2">
  <button (click)="vm.addNewItem()" class="cursor-pointer p-2 border border-black">
    Add new Item
  </button>
  @for (item of vm.items(); track item.id) {
    <div (click)="vm.selectItem(item.id)" class="p-1 border border-black rounded-xl cursor-pointer">
      {{ item.title }} {{ vm.selectedItem()?.id == item.id ? '✅' : '' }}
    </div>
  }
</div>
